<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LICHub</title>

  <!-- AG Grid -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine-dark.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="app-container">

    <!-- Login View -->
    <section id="loginView" class="card login-card">
      <h1>LICHub Login</h1>
      <p class="subtitle">Sign in to continue</p>

      <label for="emailInput">User Email</label>
      <input type="email" id="emailInput" placeholder="Enter your email" />
      <button id="loginBtn">Login</button>
      <p id="loginError" class="error-msg"></p>
    </section>

    <!-- Landing View -->
    <section id="landingView" class="hidden">
      <h1>LICHub Dashboard</h1>

      <div class="accordion">
        <button class="accordion-header" id="accordionToggle" aria-expanded="true">
          Summary Grid
          <span class="chevron">▼</span>
        </button>
        <div class="accordion-body expanded" id="accordionBody">
          <div id="summaryGrid" class="ag-theme-alpine-dark"></div>
        </div>
      </div>
    </section>

  </div>

  <!-- AG Grid JS -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

  <!-- App JS -->
  <script src="js/main.js"></script>
</body>
</html>
