<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LICHub</title>

  <!-- AG Grid (Quartz) -->
  <link rel="stylesheet" href="https://unpkg.com/ag-grid-community/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://unpkg.com/ag-grid-community/styles/ag-theme-quartz.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <div class="app-container">

    <!-- Login View -->
    <section id="loginView" class="card login-card">
      <h1>LICHub Login</h1>
      <p class="subtitle">Sign in to continue</p>

      <label for="emailInput">User Email</label>
      <input type="email" id="emailInput" placeholder="Enter your email" value="jean.l.picard@cyberdyne.com" />
      <button id="loginBtn" type="button">Login</button>
      <p id="loginError" class="error-msg"></p>
    </section>

    <!-- Landing View -->
    <section id="landingView" class="hidden">
      <header class="page-header">
        <h1>LICHub Dashboard</h1>
        <p class="subtitle">License utilization summary</p>
      </header>

      <section class="accordion">
        <button class="accordion-header" id="accordionToggle" aria-expanded="true" type="button">
          <span>Summary Grid</span>
          <span class="chevron">▼</span>
        </button>

        <div class="accordion-body expanded" id="accordionBody">
          <div class="grid-toolbar">
            <div class="search-wrap">
              <input
                type="text"
                id="quickSearchInput"
                class="quick-search"
                placeholder="Quick search across all columns..."
                aria-label="Quick search"
              />

              <button class="filter-btn" id="openFilterBtn" type="button" aria-label="Open filters">
                <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M3 5h18l-7 8v5l-4 2v-7L3 5z"></path>
                </svg>
                <span>Filters</span>
              </button>
            </div>
          </div>

          <!-- Filter Modal -->
          <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
            <div class="filter-modal" role="dialog" aria-modal="true" aria-labelledby="filterTitle">
              <div class="modal-header">
                <h2 id="filterTitle">Filters</h2>
                <button class="text-btn" id="toggleAllBtn" type="button">Collapse All</button>
              </div>

              <div class="tree-root" id="filterTreeRoot">
                <!-- JS will render groups here -->
              </div>

              <div class="modal-footer">
                <button class="text-btn" id="cancelFiltersBtn" type="button">Cancel</button>
                <button class="text-btn" id="clearFiltersBtn" type="button">Clear</button>
                <button class="btn-primary" id="applyFiltersBtn" type="button">Apply Filters</button>
              </div>
            </div>
          </div>



          <div class="grid-frame">
            <div id="summaryGrid" class="ag-theme-quartz clean-grid"></div>
          </div>
        </div>
      </section>
    </section>

  </div>

  <!-- AG Grid JS -->
  <script src="https://unpkg.com/ag-grid-community/dist/ag-grid-community.min.js"></script>

  <!-- App JS -->
  <script src="js/main.js"></script>
</body>

</html>
