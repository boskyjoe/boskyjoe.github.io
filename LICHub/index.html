<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Hub | Filter Model</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-gray: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            padding: 40px;
            color: var(--text-main);
        }

        .filter-container {
            background: white;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .filter-header {
            padding: 16px 20px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .toggle-all-btn {
            background: none;
            border: none;
            color: var(--primary-blue);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .toggle-all-btn:hover {
            background: #eff6ff;
        }

        .tree-root {
            padding: 10px 20px 20px 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .tree-node {
            margin: 8px 0;
        }

        .category-header {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            padding: 6px 0;
            user-select: none;
        }

        .category-header::before {
            content: '▶';
            display: inline-block;
            margin-right: 8px;
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .tree-node.expanded > .category-header::before {
            transform: rotate(90deg);
        }

        .options-list {
            display: none;
            margin-left: 24px;
            padding-top: 4px;
        }

        .tree-node.expanded > .options-list {
            display: block;
        }

        .filter-option {
            display: flex;
            align-items: center;
            padding: 4px 0;
            font-size: 0.95rem;
        }

        .filter-option input {
            margin-right: 10px;
            cursor: pointer;
        }

        .footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        button.apply-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        button.apply-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="filter-container">
    <div class="filter-header">
        <h2>Filters</h2>
        <button class="toggle-all-btn" id="toggleAll">Expand All</button>
    </div>

    <div class="tree-root" id="filterTree">
        <div class="tree-node expanded">
            <div class="category-header">Licensing Method</div>
            <div class="options-list">
                <label class="filter-option"><input type="checkbox"> Smar</label>
                <label class="filter-option"><input type="checkbox"> Traditional</label>
                <label class="filter-option"><input type="checkbox"> Cloud</label>
                <label class="filter-option"><input type="checkbox"> Co-Term</label>
            </div>
        </div>

        <div class="tree-node expanded">
            <div class="category-header">Billing Type</div>
            <div class="options-list">
                <label class="filter-option"><input type="checkbox"> Prepaid</label>
                <label class="filter-option"><input type="checkbox"> By Usage</label>
                <label class="filter-option"><input type="checkbox"> Hybrid</label>
            </div>
        </div>

        <div class="tree-node expanded">
            <div class="category-header">Usage</div>
            <div class="options-list">
                <label class="filter-option"><input type="checkbox"> Overusage</label>
                <label class="filter-option"><input type="checkbox"> Full Usage</label>
                <label class="filter-option"><input type="checkbox"> Underusage</label>
                <label class="filter-option"><input type="checkbox"> By Usage - Postpaid</label>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="toggle-all-btn" style="color: #64748b;" onclick="clearFilters()">Clear All</button>
        <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
    </div>
</div>

<script>
    const toggleAllBtn = document.getElementById('toggleAll');
    const nodes = document.querySelectorAll('.tree-node');
    let allExpanded = true;

    // Handle Individual Expand/Collapse
    document.querySelectorAll('.category-header').forEach(header => {
        header.addEventListener('click', () => {
            header.parentElement.classList.toggle('expanded');
        });
    });

    // Expand/Collapse All Logic
    toggleAllBtn.addEventListener('click', () => {
        allExpanded = !allExpanded;
        nodes.forEach(node => {
            if (allExpanded) {
                node.classList.add('expanded');
            } else {
                node.classList.remove('expanded');
            }
        });
        toggleAllBtn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
    });

    function clearFilters() {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    function applyFilters() {
        const selected = [];
        document.querySelectorAll('input:checked').forEach(cb => {
            selected.push(cb.parentElement.textContent.trim());
        });
        alert('Selected Filters: ' + (selected.join(', ') || 'None'));
    }
</script>

</body>
</html>
